document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

, goals, and category competition.' },\n      { n:'03', t:'Build & Optimize', d:'We rebuild campaigns and listings, then optimize daily on real data.' },\n      { n:'04', t:'Scale & Defend', d:'Push winners harder, expand reach, and defend your share of the Buy Box.' },\n      { n:'05', t:'Report & Compound', d:'Clear reporting and compounding gains — month after month, no guesswork.' },\n    ];\n\n    const cases = [\n      { cat:'Home & Kitchen', brand:'Apex Home', img:(window.__resources&&window.__resources.caseHome)||'assets/case-home.png', result:'ACoS 34% → 17%', detail:'Restructured the entire ad account and recovered margin to fund $1.2M/month in profitable sales.' },\n      { cat:'Supplements', brand:'VitalCore', img:(window.__resources&&window.__resources.caseSupp)||'assets/case-supp.png', result:'4.6x ROAS in 90 days', detail:'Rebuilt listings and PPC from the ground up, doubling return on ad spend in a single quarter.' },\n      { cat:'Pet Care', brand:'PawNest', img:(window.__resources&&window.__resources.casePet)||'assets/case-pet.png', result:'+212% revenue', detail:'Fixed broken variations and scaled Sponsored Brands while holding TACoS at a healthy 9%.' },\n    ];\n\n    const testimonials = [\n      { source:'Upwork', initial:'M', name:'Marcus T.', role:'Founder, Home & Kitchen brand', quote:\"They found leaks our last agency completely missed. ACoS dropped fast and sales actually went up — finally an agency that gets it.\" },\n      { source:'Google', initial:'S', name:'Sara L.', role:'Brand Manager, Supplements', quote:\"Communication is clear, the strategy is sharp, and the results speak for themselves. Best decision we made this year.\" },\n      { source:'Upwork', initial:'D', name:'Daniel K.', role:'Owner, Pet brand', quote:\"Our catalog was a mess of broken variations. They fixed everything and then scaled us — revenue more than tripled.\" },\n    ];\n\n    const faqData = [\n      { q:'What types of PPC campaigns do you manage?', a:'We manage Sponsored Products, Sponsored Brands, and Sponsored Display across both Seller Central and Vendor Central, structured around your target ACoS and margins.' },\n      { q:'Do you work with brands or individual sellers?', a:'We focus on established brands and serious sellers who value structure, clear communication, and long-term, profitable growth — not quick hacks.' },\n      { q:'What exactly does the free audit include?', a:'A senior strategist reviews your account for wasted ad spend, campaign structure, listing quality, and catalog health, then shows you the biggest opportunities — with no obligation.' },\n      { q:\"What's included in catalog management?\", a:'Listing creation and optimization, variation and parent-child setup, flat-file handling, category and compliance fixes, suppressed-listing recovery, and ongoing catalog health monitoring.' },\n      { q:'How soon can I expect results?', a:'PPC needs a short learning and data-collection window — typically a few weeks before consistent gains. Our 60-day guarantee keeps us accountable to measurable movement.' },\n      { q:'How do I get started?', a:'Request your free audit above or email info@adsxtreme.com. We assess fit first, then map out exactly how we can move your numbers.' },\n    ];\n    const faqs = faqData.map((f,i)=>({ ...f, open:i===this.state.openFaq, sign:i===this.state.openFaq?'–':'+', toggle:()=>this.setState(s=>({ openFaq:s.openFaq===i?-1:i })) }));\n\n    return {\n      brands, leaks, stats, services, steps, cases, testimonials, faqs,\n      mobileOpen:this.state.mobileOpen,\n      submitted:this.state.submitted,\n      submittedEmail:this.state.submittedEmail,\n      toggleMobile:()=>this.setState(s=>({ mobileOpen:!s.mobileOpen })),\n      closeMobile:()=>this.setState({ mobileOpen:false }),\n      onSubmit:(e)=>{ e.preventDefault(); const v=e.target.querySelector('input').value; this.setState({ submitted:true, submittedEmail:v }); },\n    };\n  }\n\n  componentDidMount(){\n    // responsive layout adjustments (no media queries available with inline styles)\n    const applyResponsive = () => {\n      const w = window.innerWidth;\n      const set = (sel, prop, val) => document.querySelectorAll(sel).forEach(el => el.style[prop] = val);\n      const grids3 = ['[data-svc]'];\n      if (w < 920){\n        document.querySelectorAll('[data-herogrid]').forEach(el=>{ el.style.gridTemplateColumns='1fr'; el.style.gap='48px'; });\n        document.querySelectorAll('nav[style*=\"gap:30px\"], header nav').forEach(el=>{ el.style.display='none'; });\n        document.querySelectorAll('[data-burger]').forEach(el=>{ el.style.display='flex'; });\n        document.querySelectorAll('[data-desktopcta]').forEach(el=>{ el.style.display='none'; });\n      } else {\n        document.querySelectorAll('[data-herogrid]').forEach(el=>{ el.style.gridTemplateColumns='1.05fr .95fr'; el.style.gap='54px'; });\n        document.querySelectorAll('header nav').forEach(el=>{ el.style.display='flex'; });\n        document.querySelectorAll('[data-burger]').forEach(el=>{ el.style.display='none'; });\n        document.querySelectorAll('[data-desktopcta]').forEach(el=>{ el.style.display='inline-flex'; });\n      }\n    };\n    applyResponsive();\n    window.addEventListener('resize', applyResponsive);\n\n    // hover lift for service cards\n    document.querySelectorAll('[data-svc]').forEach(el=>{\n      el.addEventListener('mouseenter',()=>{ el.style.transform='translateY(-5px)'; el.style.boxShadow='0 26px 50px -30px rgba(20,40,90,.45)'; el.style.borderColor='#cfe0f5'; });\n      el.addEventListener('mouseleave',()=>{ el.style.transform='none'; el.style.boxShadow='none'; el.style.borderColor='#e8edf6'; });\n    });\n\n    // count-up\n    const animate=(el)=>{\n      const target=parseFloat(el.dataset.count);\n      const dec=el.dataset.dec?parseInt(el.dataset.dec):0;\n      const prefix=el.dataset.prefix||''; const suffix=el.dataset.suffix||'';\n      const dur=1500; const start=performance.now();\n      const tick=(now)=>{\n        const p=Math.min(1,(now-start)/dur);\n        const e=1-Math.pow(1-p,3);\n        const val=target*e;\n        el.textContent=prefix+(dec?val.toFixed(dec):Math.round(val).toLocaleString())+suffix;\n        if(p<1) requestAnimationFrame(tick);\n      };\n      requestAnimationFrame(tick);\n    };\n    const io=new IntersectionObserver((ents)=>{\n      ents.forEach(en=>{ if(en.isIntersecting){ animate(en.target); io.unobserve(en.target); } });\n    },{threshold:0.4});\n    setTimeout(()=>{ document.querySelectorAll('[data-count]').forEach(el=>io.observe(el)); },120);\n\n    // reveal on scroll\n    const ro=new IntersectionObserver((ents)=>{\n      ents.forEach(en=>{ if(en.isIntersecting){ en.target.style.opacity='1'; en.target.style.transform='none'; ro.unobserve(en.target); } });\n    },{threshold:0.12});\n    setTimeout(()=>{\n      document.querySelectorAll('[data-reveal]').forEach((el,i)=>{\n        el.style.opacity='0'; el.style.transform='translateY(26px)';\n        el.style.transition='opacity .7s ease '+((i%3)*0.07)+'s, transform .7s ease '+((i%3)*0.07)+'s';\n        ro.observe(el);\n      });\n    },120);\n  }\n}\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
